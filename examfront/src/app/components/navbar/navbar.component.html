<!-- navbar.component.html -->
<nav class="navbar">

 
  <!-- Hamburger - mobile only, only when logged in -->
<button class="nav-hamburger" *ngIf="isLoggedIn" (click)="toggleSidebar()">
  <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
    <path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </svg>
</button>
  <!-- Left Logo -->
  <div class="logo">
    <!-- <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M2 17l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </div> -->
    <div class="logo-text" [routerLink]="router.url === '/login' || router.url === '/signup' ? '/' : null"
  style="cursor:pointer">
      <span class="logo-name">Exam<em>Portal</em></span>
      <span class="logo-tagline">Academic Suite</span>
    </div>
  </div>

  <span class="spacer"></span>

  <!-- Right User Section -->
  <div class="user-section" *ngIf="isLoggedIn">
    <div class="user-pill">
      <div class="avatar">
        <mat-icon>person</mat-icon>
      </div>
      <span class="username">{{ user?.username }}</span>
      <div class="status-dot"></div>
    </div>

    <button class="logout-btn" (click)="logout()">
      <svg viewBox="0 0 24 24" fill="none" class="logout-icon">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span>Sign Out</span>
    </button>
  </div>
</nav>
