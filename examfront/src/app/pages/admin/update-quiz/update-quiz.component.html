<div class="add-quiz-wrapper">

  <!-- Page Header -->
  <div class="page-header">
    <div>
      <p class="section-eyebrow">Quiz Management</p>
      <h1 class="page-title">Update Quiz</h1>
    </div>
    <button class="btn-back" routerLink="/admin/quizzes">
      <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
        <path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to Quizzes
    </button>
  </div>

  <!-- Form Card -->
  <div class="form-card" *ngIf="quiz">

    <!-- Card Header -->
    <div class="form-card-header">
      <div class="fch-icon">
        <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <h2 class="fch-title">Edit Quiz Details</h2>
        <p class="fch-sub">Update the information below and save your changes</p>
      </div>
    </div>

    <div class="form-divider"></div>

    <form (ngSubmit)="updateQuiz()">

      <!-- Title -->
      <div class="form-group">
        <label class="form-label" for="title">
          Quiz Title <span class="required">*</span>
        </label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
              <path d="M4 6h16M4 12h16M4 18h7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </span>
          <input
            id="title"
            class="form-input"
            type="text"
            name="title"
            [(ngModel)]="quiz.title"
            placeholder="e.g. JavaScript Fundamentals"
            required>
        </div>
      </div>

      <!-- Description -->
      <div class="form-group">
        <label class="form-label" for="description">Description</label>
        <div class="textarea-wrapper">
          <span class="textarea-icon">
            <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="16" y1="13" x2="8" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="16" y1="17" x2="8" y2="17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </span>
          <textarea
            id="description"
            class="form-textarea"
            name="description"
            [(ngModel)]="quiz.description"
            placeholder="Describe what this quiz covers..."
            rows="4">
          </textarea>
        </div>
      </div>

      <!-- Max Marks + Number of Questions -->
      <div class="form-row">

        <div class="form-group">
          <label class="form-label" for="maxMarks">
            Max Marks <span class="required">*</span>
          </label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              </svg>
            </span>
            <input
              id="maxMarks"
              class="form-input"
              type="text"
              name="maxMarks"
              [(ngModel)]="quiz.maxMarks"
              placeholder="e.g. 100"
              required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="numberOfQuestions">
            Number of Questions <span class="required">*</span>
          </label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <circle cx="12" cy="17" r="0.8" fill="currentColor"/>
              </svg>
            </span>
            <input
              id="numberOfQuestions"
              class="form-input"
              type="text"
              name="numberOfQuestions"
              [(ngModel)]="quiz.numberOfQuestions"
              placeholder="e.g. 20"
              required>
          </div>
        </div>

      </div>

      <!-- Category Select -->
      <div class="form-group">
        <label class="form-label" for="category">
          Category <span class="required">*</span>
        </label>
        <div class="select-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
              <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
              <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
              <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
              <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </span>
          <select
            id="category"
            class="form-select"
            name="category"
            [(ngModel)]="quiz.category.cid">
            <option value="" disabled>Select a category</option>
            <option *ngFor="let c of categories" [value]="c.cid">{{ c.title }}</option>
          </select>
          <span class="select-arrow">
            <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
              <polyline points="6 9 12 15 18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Publish Status Toggle -->
      <div class="form-group">
        <label class="form-label">Publish Status</label>
        <div class="toggle-row">
          <div class="toggle-info">
            <p class="toggle-title">{{ quiz.active ? 'Published' : 'Draft' }}</p>
            <p class="toggle-sub">{{ quiz.active ? 'Quiz is visible to students' : 'Quiz is hidden from students' }}</p>
          </div>
          <label class="toggle-switch">
            <input
              type="checkbox"
              name="active"
              [(ngModel)]="quiz.active">
            <span class="toggle-track">
              <span class="toggle-thumb"></span>
            </span>
          </label>
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button class="btn-submit" type="submit">
          <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="17 21 17 13 7 13 7 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="7 3 7 8 15 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Update Quiz
        </button>
        <button class="btn-reset" type="button" routerLink="/admin/quizzes">
          Cancel
        </button>
      </div>

    </form>

  </div>

</div>
