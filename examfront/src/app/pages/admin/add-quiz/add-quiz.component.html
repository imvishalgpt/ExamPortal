<div class="add-quiz-wrapper">

  <!-- Page Header -->
  <div class="page-header">
    <div>
      <p class="section-eyebrow">Quiz Management</p>
      <h1 class="page-title">Add New Quiz</h1>
    </div>
    <button class="btn-back" routerLink="/admin/quizzes">
      <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
        <path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to Quizzes
    </button>
  </div>

  <!-- Form Card -->
  <div class="form-card">

    <div class="form-card-header">
      <div class="fch-icon">
        <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="12" cy="17" r="0.8" fill="currentColor"/>
        </svg>
      </div>
      <div>
        <h2 class="fch-title">Quiz Details</h2>
        <p class="fch-sub">Fill in the information below to create a new quiz</p>
      </div>
    </div>

    <div class="form-divider"></div>

    <form (ngSubmit)="addQuiz()">

      <!-- Title -->
      <div class="form-group">
        <label class="form-label" for="title">Quiz Title <span class="required">*</span></label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
              <path d="M4 6h16M4 12h16M4 18h7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </span>
          <input id="title" class="form-input" type="text" name="title"
            [(ngModel)]="quizData.title" placeholder="e.g. JavaScript Fundamentals" required>
        </div>
      </div>

      <!-- Description -->
      <div class="form-group">
        <label class="form-label" for="description">Description</label>
        <div class="textarea-wrapper">
          <span class="textarea-icon">
            <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="16" y1="13" x2="8" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="16" y1="17" x2="8" y2="17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </span>
          <textarea id="description" class="form-textarea" name="description"
            [(ngModel)]="quizData.description" placeholder="Describe what this quiz covers..." rows="4">
          </textarea>
        </div>
      </div>

      <!-- Marks + Questions row -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="maxMarks">Max Marks <span class="required">*</span></label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              </svg>
            </span>
            <input id="maxMarks" class="form-input" type="number" name="maxMarks"
              [(ngModel)]="quizData.maxMarks" placeholder="e.g. 100" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="numberOfQuestions">No. of Questions <span class="required">*</span></label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <circle cx="12" cy="17" r="0.8" fill="currentColor"/>
              </svg>
            </span>
            <input id="numberOfQuestions" class="form-input" type="number" name="numberOfQuestions"
              [(ngModel)]="quizData.numberOfQuestions" placeholder="e.g. 20" required>
          </div>
        </div>
      </div>

      <!-- Category -->
      <div class="form-group">
        <label class="form-label" for="category">Category <span class="required">*</span></label>
        <div class="select-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
              <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
              <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
              <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
              <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </span>
          <select id="category" class="form-select" name="category"
            [(ngModel)]="quizData.category.cid">
            <option value="" disabled selected>Select a category</option>
            <option *ngFor="let c of categories" [value]="c.cid">{{ c.title }}</option>
          </select>
          <span class="select-arrow">
            <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
              <polyline points="6 9 12 15 18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Publish Toggle -->
      <div class="form-group">
        <label class="form-label">Publish Status</label>
        <div class="toggle-row">
          <label class="toggle-switch">
            <input type="checkbox" name="active" [(ngModel)]="quizData.active">
            <span class="toggle-track">
              <span class="toggle-thumb"></span>
            </span>
          </label>
          <div class="toggle-labels">
            <span class="toggle-title">{{ quizData.active ? 'Published' : 'Draft' }}</span>
            <span class="toggle-sub">{{ quizData.active ? 'Quiz is visible to students' : 'Quiz is hidden from students' }}</span>
          </div>
          <span class="toggle-badge" [ngClass]="quizData.active ? 'badge-active' : 'badge-draft'">
            {{ quizData.active ? 'Live' : 'Draft' }}
          </span>
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button class="btn-submit" type="submit">
          <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
            <line x1="12" y1="8" x2="12" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="8" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Add Quiz
        </button>
        <button class="btn-reset" type="reset">Clear</button>
      </div>

    </form>
  </div>
</div>
