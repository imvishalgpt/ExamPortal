<div class="update-question-wrapper">

  <!-- Page Header -->
  <div class="page-header">
    <div>
      <p class="section-eyebrow">Quiz Management</p>
      <h1 class="page-title">Update Question</h1>
    </div>
    <button class="btn-back" routerLink="/admin/quizzes">
      <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
        <path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </button>
  </div>

  <!-- Form Card -->
  <div class="form-card">

    <!-- Card Header -->
    <div class="form-card-header">
      <div class="fch-icon">
        <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <h2 class="fch-title">Edit Question</h2>
        <p class="fch-sub">Update the question content, options and correct answer</p>
      </div>
    </div>

    <div class="form-divider"></div>

    <form (ngSubmit)="updateQuestion()">

      <!-- Question Content -->
      <div class="form-group">
        <label class="form-label" for="content">
          Question Content <span class="required">*</span>
        </label>
        <div class="textarea-wrapper">
          <span class="textarea-icon">
            <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <textarea
            id="content"
            class="form-textarea"
            name="content"
            [(ngModel)]="question.content"
            placeholder="Enter the question here..."
            rows="3">
          </textarea>
        </div>
      </div>

      <!-- Options Section -->
      <div class="options-section">
        <p class="options-heading">
          <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <circle cx="12" cy="17" r="0.8" fill="currentColor"/>
          </svg>
          Answer Options
        </p>

        <div class="options-grid">

          <!-- Option 1 -->
          <div class="option-field">
            <div class="option-badge opt-a">A</div>
            <div class="input-wrapper flex1">
              <input
                class="form-input"
                type="text"
                name="option1"
                [(ngModel)]="question.option1"
                placeholder="Option A">
            </div>
          </div>

          <!-- Option 2 -->
          <div class="option-field">
            <div class="option-badge opt-b">B</div>
            <div class="input-wrapper flex1">
              <input
                class="form-input"
                type="text"
                name="option2"
                [(ngModel)]="question.option2"
                placeholder="Option B">
            </div>
          </div>

          <!-- Option 3 -->
          <div class="option-field">
            <div class="option-badge opt-c">C</div>
            <div class="input-wrapper flex1">
              <input
                class="form-input"
                type="text"
                name="option3"
                [(ngModel)]="question.option3"
                placeholder="Option C">
            </div>
          </div>

          <!-- Option 4 -->
          <div class="option-field">
            <div class="option-badge opt-d">D</div>
            <div class="input-wrapper flex1">
              <input
                class="form-input"
                type="text"
                name="option4"
                [(ngModel)]="question.option4"
                placeholder="Option D">
            </div>
          </div>

        </div>
      </div>

      <!-- Correct Answer Select -->
      <div class="form-group">
        <label class="form-label" for="answer">
          Correct Answer <span class="required">*</span>
        </label>
        <div class="select-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <polyline points="22 4 12 14.01 9 11.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <select
            id="answer"
            class="form-select"
            name="answer"
            [(ngModel)]="question.answer">
            <option value="" disabled>Select the correct answer</option>
            <option value="option1">Option A</option>
            <option value="option2">Option B</option>
            <option value="option3">Option C</option>
            <option value="option4">Option D</option>
          </select>
          <span class="select-arrow">
            <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
              <polyline points="6 9 12 15 18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button class="btn-submit" type="submit">
          <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="17 21 17 13 7 13 7 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="7 3 7 8 15 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Update Question
        </button>
        <button class="btn-cancel" type="button" routerLink="/admin/quizzes">
          Cancel
        </button>
      </div>

    </form>

  </div>

</div>
