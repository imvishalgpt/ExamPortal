<!-- Overlay only - hamburger is now in navbar -->
<div class="sidebar-overlay" [class.open]="isOpen" (click)="closeSidebar()"></div>

<div class="sidebar" [class.open]="isOpen">

  <!-- Brand Header -->
  <div class="sidebar-header">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="brand-text">
      <span class="brand-name">Exam<em>Portal</em></span>
      <span class="brand-sub">Academic Suite</span>
    </div>
    <button class="close-btn" (click)="closeSidebar()">
      <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <nav class="sidebar-nav">
    <div class="menu-group">
      <span class="menu-label">Dashboard</span>
      <a class="nav-item" routerLink="/admin/" routerLinkActive="active" (click)="closeSidebar()">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" width="17" height="17">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span>Home</span>
      </a>
      <a class="nav-item" routerLink="/admin/profile" routerLinkActive="active" (click)="closeSidebar()">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" width="17" height="17">
            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <span>Profile</span>
      </a>
    </div>

    <div class="menu-group">
      <span class="menu-label">Category Management</span>
      <a class="nav-item" routerLink="/admin/categories" routerLinkActive="active" (click)="closeSidebar()">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" width="17" height="17">
            <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
          </svg>
        </div>
        <span>Categories</span>
      </a>
      <a class="nav-item" routerLink="/admin/add-category" routerLinkActive="active" (click)="closeSidebar()">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" width="17" height="17">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
            <line x1="12" y1="8" x2="12" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="8" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <span>Add Category</span>
      </a>
    </div>

    <div class="menu-group">
      <span class="menu-label">Quiz Management</span>
      <a class="nav-item" routerLink="/admin/quizzes" routerLinkActive="active" (click)="closeSidebar()">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" width="17" height="17">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <circle cx="12" cy="17" r="0.8" fill="currentColor"/>
          </svg>
        </div>
        <span>Quizzes</span>
      </a>
      <a class="nav-item" routerLink="/admin/add-quiz" routerLinkActive="active" (click)="closeSidebar()">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" width="17" height="17">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
            <line x1="12" y1="8" x2="12" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="8" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <span>Add Quiz</span>
      </a>
    </div>

    <div class="menu-group">
      <span class="menu-label">Students</span>
      <a class="nav-item" routerLink="/admin/students" routerLinkActive="active" (click)="closeSidebar()">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" width="17" height="17">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <span>Students</span>
      </a>
    </div>
  </nav>

  <div class="sidebar-spacer"></div>
  <div class="sidebar-divider"></div>

  <a class="nav-item logout-item" routerLink="/login" (click)="closeSidebar()">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" width="17" height="17">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <span>Logout</span>
  </a>

</div>
