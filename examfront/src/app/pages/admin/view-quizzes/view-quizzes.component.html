<div class="quizzes-wrapper">

  <!-- Page Header -->
  <div class="page-header">
    <div>
      <p class="section-eyebrow">Quiz Management</p>
      <h1 class="page-title">All Quizzes</h1>
    </div>
    <button class="btn-primary" routerLink="/admin/add-quiz">
      <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
        <line x1="12" y1="8" x2="12" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="8" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Add New Quiz
    </button>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="!quizzes || quizzes.length === 0">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24" fill="none" width="32" height="32">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="12" cy="17" r="0.8" fill="currentColor"/>
      </svg>
    </div>
    <h3>No quizzes yet</h3>
    <p>Create your first quiz to get started</p>
    <button class="btn-primary" routerLink="/admin/add-quiz">Add Quiz</button>
  </div>

  <!-- Quizzes Grid -->
  <div class="quizzes-grid" *ngIf="quizzes && quizzes.length > 0">

    <div class="quiz-card" *ngFor="let q of quizzes; let i = index"
      [style.animation-delay]="i * 0.07 + 's'">

      <!-- Top accent bar -->
      <div class="card-accent" [ngClass]="'accent-' + (i % 4)"></div>

      <!-- Card Header -->
      <div class="card-header">
        <div class="card-icon" [ngClass]="'icon-' + (i % 4)">
          <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <circle cx="12" cy="17" r="0.8" fill="currentColor"/>
          </svg>
        </div>
        <div class="card-title-group">
          <h3 class="card-title">{{ q.title }}</h3>
          <span class="card-category">{{ q.category.title }}</span>
        </div>
        <span class="card-status" [ngClass]="q.active ? 'status-active' : 'status-inactive'">
          {{ q.active ? 'Active' : 'Inactive' }}
        </span>
      </div>

      <!-- Description -->
      <p class="card-desc">{{ q.description }}</p>

      <!-- Meta row -->
      <div class="card-meta">
        <div class="meta-item">
          <div class="meta-icon">
            <svg viewBox="0 0 24 24" fill="none" width="13" height="13">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <circle cx="12" cy="17" r="0.8" fill="currentColor"/>
            </svg>
          </div>
          <span>{{ q.numberOfQuestions }} Questions</span>
        </div>
        <div class="meta-divider"></div>
        <div class="meta-item">
          <div class="meta-icon">
            <svg viewBox="0 0 24 24" fill="none" width="13" height="13">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            </svg>
          </div>
          <span>{{ q.maxMarks }} Marks</span>
        </div>
      </div>

      <!-- Divider -->
      <div class="card-divider"></div>

      <!-- Actions -->
      <div class="card-actions">
        <button class="action-btn btn-questions"
          [routerLink]="'/admin/view-questions/' + q.qId + '/' + q.title">
          <svg viewBox="0 0 24 24" fill="none" width="13" height="13">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
          </svg>
          Questions
        </button>

        <button class="action-btn btn-update"
          [routerLink]="'/admin/quiz/' + q.qId">
          <svg viewBox="0 0 24 24" fill="none" width="13" height="13">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Update
        </button>

        <button class="action-btn btn-attempts" [routerLink]="['/admin/attempts', q.qId, q.title]">
          <svg viewBox="0 0 24 24" fill="none" width="13" height="13">
            <line x1="18" y1="20" x2="18" y2="10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="12" y1="20" x2="12" y2="4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="6" y1="20" x2="6" y2="14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          Attempts
        </button>

        <button class="action-btn btn-delete"
          (click)="deleteQuiz(q.qId)">
          <svg viewBox="0 0 24 24" fill="none" width="13" height="13">
            <polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          Delete
        </button>
      </div>

    </div>

  </div>

</div>
