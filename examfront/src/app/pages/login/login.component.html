<div class="login-wrapper">

  <!-- Left Panel -->
  <div class="login-left">
    

    <div class="left-content">
      <h1>Welcome back! 👋</h1>
      <p>Log in to manage quizzes, track students, and monitor your examination portal.</p>

      <div class="feature-list">
        <div class="feature-item">
          <div class="fi-icon" style="--c:#3d5af1; --bg:#eef1fd;">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
              <path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span>Create & manage quizzes</span>
        </div>
        <div class="feature-item">
          <div class="fi-icon" style="--c:#0ea47a; --bg:#edfaf5;">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
            </svg>
          </div>
          <span>Track student performance</span>
        </div>
        <div class="feature-item">
          <div class="fi-icon" style="--c:#e8245e; --bg:#fdeef3;">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
              <line x1="18" y1="20" x2="18" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="12" y1="20" x2="12" y2="4"  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="6"  y1="20" x2="6"  y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <span>Analyze test results</span>
        </div>
      </div>
    </div>

  </div>

  <!-- Right Panel — Login Form -->
  <div class="login-right">
    <div class="login-card">

      <div class="login-header">
        <img
          src="../../../assets/logo-design-hand-gesture-holding-small-ball-signifying-agreement-okay-state_106330-38.avif"
          class="login-logo"
          alt="ExamPortal logo">
        <h2>Sign in to your account</h2>
        <p>Welcome back! Please login to continue</p>
      </div>

      <form (ngSubmit)="formSubmit()">

        <!-- Username -->
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
                <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </span>
            <input
              id="username"
              class="form-input"
              type="text"
              name="username"
              [(ngModel)]="loginData.username"
              placeholder="Enter your username"
              required
              autocomplete="username">
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
                <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.8"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </span>
            <input
              id="password"
              class="form-input"
              type="password"
              name="password"
              [(ngModel)]="loginData.password"
              placeholder="Enter your password"
              required
              autocomplete="current-password">
          </div>
        </div>

        <!-- Buttons -->
        <div class="form-actions">
          <button class="btn-login" type="submit">
            <span>Login</span>
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
              <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="btn-reset" type="reset">Reset</button>
        </div>

        <p class="signup-link">
          Don't have an account? <a routerLink="/signup">Sign up free</a>
        </p>

      </form>

    </div>
  </div>

</div>
