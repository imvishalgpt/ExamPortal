<div class="register-wrapper">

  <!-- Left Panel -->
  <div class="register-left">
   

    <div class="left-content">
      <h1>Join us today! 🎓</h1>
      <p>Create your account and start giving exams, quizzes, and student performance all in one place.</p>

      <div class="feature-list">
        <div class="feature-item">
          <div class="fi-icon" style="--c:#3d5af1; --bg:#eef1fd;">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
              <path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span>Free to get started</span>
        </div>
        <div class="feature-item">
          <div class="fi-icon" style="--c:#0ea47a; --bg:#edfaf5;">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
              <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.8"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <span>Secure & private</span>
        </div>
        <div class="feature-item">
          <div class="fi-icon" style="--c:#e8245e; --bg:#fdeef3;">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
            </svg>
          </div>
          <span>Manage students easily</span>
        </div>
      </div>
    </div>

    <!-- Step indicator -->
    <div class="step-indicator">
      <div class="step active"><span>1</span> Account</div>
      <div class="step-line"></div>
      <div class="step active"><span>2</span> Profile</div>
      <div class="step-line"></div>
      <div class="step"><span>3</span> Done</div>
    </div>
  </div>

  <!-- Right Panel — Register Form -->
  <div class="register-right">
    <div class="register-card">

      <div class="register-header">
        <img
          src="../../../assets/logo-design-hand-gesture-holding-small-ball-signifying-agreement-okay-state_106330-38.avif"
          class="register-logo"
          alt="ExamPortal logo">
        <h2>Create your account</h2>
        <p>Fill in your details to get started</p>
      </div>

      <form (ngSubmit)="formSubmit()">

        <!-- Row: Username + Password -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
                  <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/>
                  <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </span>
              <input
                id="username"
                class="form-input"
                type="text"
                name="username"
                [(ngModel)]="user.username"
                placeholder="Enter username"
                required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
                  <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.8"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </span>
              <input
                id="password"
                class="form-input"
                type="password"
                name="password"
                [(ngModel)]="user.password"
                placeholder="Enter password"
                required>
            </div>
          </div>
        </div>

        <!-- Row: First Name + Last Name -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="firstname">First Name</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/>
                </svg>
              </span>
              <input
                id="firstname"
                class="form-input"
                type="text"
                name="firstname"
                [(ngModel)]="user.firstname"
                placeholder="First name"
                required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="lastname">Last Name</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/>
                </svg>
              </span>
              <input
                id="lastname"
                class="form-input"
                type="text"
                name="lastname"
                [(ngModel)]="user.lastname"
                placeholder="Last name"
                required>
            </div>
          </div>
        </div>

        <!-- Email -->
        <div class="form-group full">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="1.8"/>
                <polyline points="22,6 12,13 2,6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </span>
            <input
              id="email"
              class="form-input"
              type="email"
              name="email"
              [(ngModel)]="user.email"
              placeholder="Enter your email"
              required>
          </div>
        </div>

        <!-- Phone -->
        <div class="form-group full">
          <label class="form-label" for="phone">Phone Number</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82a16 16 0 0 0 6.27 6.27l.97-.97a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </span>
            <input
              id="phone"
              class="form-input"
              type="number"
              name="phone"
              [(ngModel)]="user.phone"
              placeholder="Enter your phone number"
              required>
          </div>
        </div>

        <!-- Buttons -->
        <div class="form-actions">
          <button class="btn-register" type="submit">
            <span>Register</span>
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
              <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="btn-clear" type="reset">Clear</button>
        </div>

        <p class="login-link">
          Already have an account? <a routerLink="/login">Login</a>
        </p>

      </form>

    </div>
  </div>

</div>
